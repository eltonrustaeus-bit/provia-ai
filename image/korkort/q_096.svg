<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" style="background:#f0f0f0">

      
  <rect x="145" y="145" width="110" height="110" fill="#6b6b6b"/>
  <rect x="0" y="145" width="400" height="110" fill="#6b6b6b"/>
<line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="18,12"/>
  <rect x="145" y="0" width="110" height="400" fill="#6b6b6b"/>
<line x1="200" y1="0" x2="200" y2="400" stroke="#ffffff" stroke-width="2" stroke-dasharray="18,12"/>
  
      <!-- Your car: from west going east -->
      <g transform="rotate(90,110,180)">
  <rect x="99" y="162" width="22" height="36" rx="5" ry="5" fill="#e63946" />
  <rect x="102" y="166" width="16" height="7" rx="2" fill="rgba(255,255,255,0.4)" />
</g>
      <line x1="130" y1="180" x2="268" y2="180" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="280,180 268,186 268,174" fill="#e63946"/>
      <!-- Car from south (to your left) going north -->
      <g transform="rotate(0,220,290)">
  <rect x="209" y="272" width="22" height="36" rx="5" ry="5" fill="#1d7dc1" />
  <rect x="212" y="276" width="16" height="7" rx="2" fill="rgba(255,255,255,0.4)" />
</g>
      <line x1="220" y1="270" x2="220" y2="132" stroke="#1d7dc1" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="220,120 226,132 214,132" fill="#1d7dc1"/>
      <!-- Priority to you (car from south is to YOUR LEFT) -->
      <circle cx="110" cy="150" r="14" fill="#f4d35e" opacity="0.9"/>
      <text x="110" y="155" font-family="Arial,sans-serif" font-size="16" fill="#1a1a1a" text-anchor="middle" font-weight="bold">✓</text>
      <text x="110" y="210" font-family="Arial,sans-serif" font-size="12" fill="#e63946" text-anchor="middle" font-weight="bold">DU</text>
      <text x="235" y="290" font-family="Arial,sans-serif" font-size="10" fill="#1d7dc1" text-anchor="middle" font-weight="bold">Till din vänster</text>
      <text x="200" y="390" font-family="Arial,sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Högerregeln: fordon till höger har företräde</text>
    
</svg>