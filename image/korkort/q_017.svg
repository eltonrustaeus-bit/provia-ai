<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" style="background:#f0f0f0">

      <!-- Main road (horizontal) -->
      <rect x="0" y="145" width="400" height="110" fill="#6b6b6b"/>
<line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-width="2" stroke-dasharray="18,12"/>
      <!-- Parking area (top) -->
      <rect x="80" y="30" width="240" height="80" fill="#aaa" rx="4" opacity="0.7"/>
      <text x="200" y="80" font-family="Arial,sans-serif" font-size="13" fill="#555" text-anchor="middle" font-weight="bold">PARKERING</text>
      <!-- Exit from parking -->
      <rect x="170" y="100" width="60" height="50" fill="#6b6b6b"/>
      <!-- Your car: exiting parking -->
      <g transform="rotate(180,200,130)">
  <rect x="189" y="112" width="22" height="36" rx="5" ry="5" fill="#e63946" />
  <rect x="192" y="116" width="16" height="7" rx="2" fill="rgba(255,255,255,0.4)" />
</g>
      <line x1="200" y1="148" x2="200" y2="138" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="200,150 194,138 206,138" fill="#e63946"/>
      <!-- Car on main road (right of way) -->
      <g transform="rotate(270,320,218)">
  <rect x="309" y="200" width="22" height="36" rx="5" ry="5" fill="#1d7dc1" />
  <rect x="312" y="204" width="16" height="7" rx="2" fill="rgba(255,255,255,0.4)" />
</g>
      <line x1="300" y1="218" x2="92" y2="218" stroke="#1d7dc1" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="80,218 92,212 92,224" fill="#1d7dc1"/>
      <circle cx="320" cy="170" r="14" fill="#f4d35e" opacity="0.9"/>
      <text x="320" y="175" font-family="Arial,sans-serif" font-size="16" fill="#1a1a1a" text-anchor="middle" font-weight="bold">✓</text>
      <text x="200" y="175" font-family="Arial,sans-serif" font-size="12" fill="#e63946" text-anchor="middle" font-weight="bold">DU</text>
      <text x="200" y="390" font-family="Arial,sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Trafik på gatan har alltid företräde mot utfartstrafik</text>
    
</svg>