<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>if(location.hostname.includes("vercel.app")&&!location.hostname.includes("provia-ai-uf")){location.replace("https://provia-ai-uf.vercel.app"+location.pathname+location.search)}</script>
  <title>ProviaAi – Lärare</title>
  <link rel="icon" href="/image/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/image/favicon-512.png" sizes="512x512" type="image/png" />
  <link rel="apple-touch-icon" href="/image/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
  .wrap{max-width:980px;margin:0 auto;padding:0 18px}
  .pageHero{padding:30px 0 22px;border-bottom:1px solid var(--l);margin-bottom:24px}
  .pageHero h1{font-size:26px;font-weight:700;letter-spacing:-.03em;color:var(--t)}
  .pageSub{font-size:13px;color:var(--t2);line-height:1.7;margin-top:6px}
  .whoLabel{font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:10px}

  /* STATUS BAR */
  .statusBar{display:none;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--r);
    font-size:13px;margin-bottom:18px;border:1px solid var(--l)}
  .statusBar.ok{background:var(--a-dim);border-color:var(--l2);color:var(--a2)}
  .statusBar.err{background:rgba(255,90,90,.10);border-color:rgba(255,90,90,.3);color:#ff9a9a}
  .statusBar.warn{background:rgba(255,200,80,.08);border-color:rgba(255,200,80,.25);color:#f4c842}

  /* SECTION */
  .sec{margin-bottom:28px}
  .secHead{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--t3);
    letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px}

  /* CREATE FORM */
  .createRow{display:flex;gap:8px;flex-wrap:wrap}
  .inp{flex:1;min-width:200px;padding:10px 13px;border-radius:var(--r);border:1px solid var(--l);
    background:var(--s);color:var(--t);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--l2)}
  .inp::placeholder{color:var(--t3)}
  .btn{padding:10px 18px;border-radius:var(--r);border:1px solid var(--l2);background:var(--a-dim);
    color:var(--a2);font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;
    transition:all .14s ease}
  .btn:hover{background:var(--a);color:var(--bg);border-color:var(--a)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--t3);border-color:var(--l)}
  .btn.ghost:hover{color:var(--t);border-color:var(--l2);background:var(--s)}

  /* CLASS CARDS */
  .classGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .classCard{background:var(--s);border:1px solid var(--l);border-radius:var(--r);padding:16px;
    cursor:pointer;transition:border-color .14s,transform .14s;position:relative}
  .classCard:hover{border-color:var(--l2);transform:translateY(-2px)}
  .classCard.active{border-color:var(--a);box-shadow:0 0 0 1px var(--a) inset}
  .className{font-size:16px;font-weight:600;color:var(--t);margin-bottom:8px;letter-spacing:-.02em}
  .classMeta{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .memberCount{font-family:var(--mono);font-size:11px;color:var(--t3)}
  .codePill{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--a2);
    background:var(--a-dim);border:1px solid var(--l);border-radius:var(--r2);padding:3px 9px;
    cursor:pointer;letter-spacing:.06em}
  .codePill:hover{border-color:var(--l2)}
  .delClass{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:var(--r2);
    border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:15px;line-height:1;
    opacity:0;transition:opacity .14s,color .14s}
  .classCard:hover .delClass{opacity:1}
  .delClass:hover{color:#ff9a9a}

  /* STUDENT TABLE */
  .tableWrap{overflow-x:auto;border:1px solid var(--l);border-radius:var(--r)}
  .stTable{width:100%;border-collapse:collapse;min-width:620px}
  .stTable thead th{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--t3);
    letter-spacing:.07em;text-transform:uppercase;padding:11px 14px;border-bottom:1px solid var(--l);
    text-align:left;background:var(--s);white-space:nowrap}
  .stTable td{padding:12px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--l);vertical-align:middle}
  .stTable tbody tr:last-child td{border-bottom:none}
  .stTable tbody tr{transition:background .1s}
  .stTable tbody tr:hover{background:var(--a-dim)}
  .stEmail{color:var(--t);font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .num{font-family:var(--mono);font-size:12px}
  .resBadge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;
    font-weight:500;letter-spacing:.05em;padding:2px 8px;border-radius:var(--r2);text-transform:uppercase}
  .resBadge.pass{background:var(--a-dim);color:var(--a2);border:1px solid var(--l2)}
  .resBadge.fail{background:rgba(255,90,90,.10);color:#ff9a9a;border:1px solid rgba(255,90,90,.3)}
  .resBadge.none{background:var(--s);color:var(--t3);border:1px solid var(--l)}
  .weakTags{display:flex;flex-wrap:wrap;gap:4px;max-width:240px}
  .weakTag{font-family:var(--mono);font-size:9.5px;color:#f4c842;background:rgba(255,200,80,.08);
    border:1px solid rgba(255,200,80,.2);border-radius:var(--r2);padding:1px 6px}
  .muted{color:var(--t3)}
  .empty{padding:30px 14px;text-align:center;color:var(--t3);font-size:13px}

  .topNav{display:flex;align-items:center;justify-content:space-between;padding:16px 0}
  .brand{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--t);letter-spacing:.1em;text-transform:uppercase}
  .brand b{color:var(--a)}
  @media(max-width:560px){.pageHero h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topNav">
      <div class="brand">Provia<b>Ai</b> · Lärare</div>
      <a class="btn ghost" href="/app.html">← Appen</a>
    </nav>

    <header class="pageHero">
      <h1>Lärar-dashboard</h1>
      <p class="pageSub">Skapa klasser, dela klasskoden med dina elever och följ deras framsteg i körkortsteorin — svaga områden, teoriprov-resultat och aktivitet.</p>
      <div class="whoLabel" id="whoLabel">Laddar…</div>
    </header>

    <div class="statusBar" id="statusBar"></div>

    <main id="main">
      <section class="sec">
        <div class="secHead">Skapa ny klass</div>
        <div class="createRow">
          <input class="inp" id="className" type="text" maxlength="80" placeholder="t.ex. Körkort VT26 – Grupp A" />
          <button class="btn" id="createBtn">Skapa klass</button>
        </div>
      </section>

      <section class="sec">
        <div class="secHead">Mina klasser</div>
        <div class="classGrid" id="classGrid"><div class="empty">Laddar klasser…</div></div>
      </section>

      <section class="sec" id="studentsSec" style="display:none">
        <div class="secHead" id="studentsHead">Elever</div>
        <div class="tableWrap">
          <table class="stTable">
            <thead><tr>
              <th>Elev</th><th>XP</th><th>Prov</th><th>Snitt</th><th>Senaste</th><th>Svaga områden</th>
            </tr></thead>
            <tbody id="studentsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://mnmotdluigzeehdjbhbu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ubW90ZGx1aWd6ZWVoZGpiaGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMzcwODQsImV4cCI6MjA4NTkxMzA4NH0.pEV4zBWqxnrPVyvrenPVArXxvXr1eRU1eRaXhl7AIY8';
const db = window.supabase.createClient(SB_URL, SB_KEY);

// Private demo — only this account may view the dashboard.
const OWNER_ID = '4a2d4593-16d3-4f9f-bc6c-54c856c21553'; // elton.rustaeus@gmail.com

let CLASSES = [];
let activeClassId = null;

function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');}

function showStatus(msg,type){
  const bar=document.getElementById('statusBar');
  bar.className='statusBar '+type; bar.textContent=msg; bar.style.display='flex';
  if(type==='ok') setTimeout(()=>{bar.style.display='none';},3000);
}

async function token(){
  const { data:{ session } } = await db.auth.getSession();
  return session?.access_token || null;
}

async function api(action,body={}){
  const t = await token();
  if(!t) throw new Error('Inte inloggad');
  const res = await fetch('/api/check-role',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${t}`},
    body: JSON.stringify({ action, ...body })
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data?.error || 'Något gick fel');
  return data;
}

function copyCode(code){
  navigator.clipboard?.writeText(code).then(()=>showStatus('Klasskod kopierad: '+code,'ok'));
}

/* ── CLASSES ── */
function renderClasses(){
  const grid=document.getElementById('classGrid');
  if(!CLASSES.length){ grid.innerHTML='<div class="empty">Inga klasser än. Skapa din första klass ovan.</div>'; return; }
  grid.innerHTML = CLASSES.map(c=>`
    <div class="classCard${c.id===activeClassId?' active':''}" data-id="${esc(c.id)}" role="button" tabindex="0">
      <button class="delClass" data-del="${esc(c.id)}" title="Radera klass" aria-label="Radera klass">×</button>
      <div class="className">${esc(c.name)}</div>
      <div class="classMeta">
        <span class="memberCount">${c.member_count} elev${c.member_count===1?'':'er'}</span>
        <span class="codePill" data-code="${esc(c.join_code)}" title="Kopiera klasskod">${esc(c.join_code)}</span>
      </div>
    </div>`).join('');
}

async function loadClasses(){
  try{
    const { classes } = await api('teacher_classes');
    CLASSES = classes || [];
    renderClasses();
  }catch(e){ showStatus('Fel: '+e.message,'err'); }
}

async function createClass(){
  const inp=document.getElementById('className');
  const name=inp.value.trim();
  if(!name){ showStatus('Ange ett klassnamn.','warn'); return; }
  const btn=document.getElementById('createBtn');
  btn.disabled=true; btn.textContent='…';
  try{
    const { class:cls } = await api('teacher_create_class',{ name });
    CLASSES.push(cls);
    inp.value='';
    renderClasses();
    showStatus(`Klass skapad. Klasskod: ${cls.join_code}`,'ok');
  }catch(e){ showStatus('Fel: '+e.message,'err'); }
  finally{ btn.disabled=false; btn.textContent='Skapa klass'; }
}

async function deleteClass(id){
  const cls=CLASSES.find(c=>c.id===id);
  if(!confirm(`Radera klassen "${cls?.name||''}"? Elevernas konton påverkas inte.`)) return;
  try{
    await api('teacher_delete_class',{ classId:id });
    CLASSES=CLASSES.filter(c=>c.id!==id);
    if(activeClassId===id){ activeClassId=null; document.getElementById('studentsSec').style.display='none'; }
    renderClasses();
    showStatus('Klass raderad.','ok');
  }catch(e){ showStatus('Fel: '+e.message,'err'); }
}

/* ── STUDENTS ── */
function fmtDate(s){ return s ? new Date(s).toLocaleDateString('sv-SE',{month:'short',day:'numeric'}) : '—'; }

function resultBadge(st){
  if(st.last_percent===null) return '<span class="resBadge none">Inget prov</span>';
  const cls = st.last_passed ? 'pass' : 'fail';
  const lbl = st.last_passed ? 'Godkänd' : 'Ej godk.';
  return `<span class="resBadge ${cls}">${lbl} ${st.last_percent}%</span>`;
}

function renderStudents(cls,students){
  document.getElementById('studentsSec').style.display='';
  document.getElementById('studentsHead').textContent=`Elever · ${cls.name} (${students.length})`;
  const body=document.getElementById('studentsBody');
  if(!students.length){ body.innerHTML='<tr><td colspan="6"><div class="empty">Inga elever har gått med än. Dela klasskoden.</div></td></tr>'; return; }
  body.innerHTML = students.map(st=>{
    const weak = st.weak_categories.length
      ? st.weak_categories.map(w=>`<span class="weakTag" title="Bästa resultat ${w.best}%">${esc(w.category)} ${w.best}%</span>`).join('')
      : '<span class="muted">—</span>';
    return `<tr>
      <td><div class="stEmail" title="${esc(st.email)}">${esc(st.email)}</div></td>
      <td class="num">${st.xp}</td>
      <td class="num">${st.tests_taken}</td>
      <td class="num">${st.avg_percent===null?'<span class="muted">—</span>':st.avg_percent+'%'}</td>
      <td>${resultBadge(st)}<div class="num muted" style="margin-top:3px">${fmtDate(st.last_at)}</div></td>
      <td><div class="weakTags">${weak}</div></td>
    </tr>`;
  }).join('');
}

async function openClass(id){
  activeClassId=id; renderClasses();
  const body=document.getElementById('studentsBody');
  document.getElementById('studentsSec').style.display='';
  document.getElementById('studentsHead').textContent='Laddar elever…';
  body.innerHTML='';
  try{
    const { class:cls, students } = await api('teacher_students',{ classId:id });
    renderStudents(cls,students);
  }catch(e){ showStatus('Fel: '+e.message,'err'); document.getElementById('studentsSec').style.display='none'; }
}

/* ── EVENTS ── */
document.getElementById('createBtn').addEventListener('click',createClass);
document.getElementById('className').addEventListener('keydown',e=>{ if(e.key==='Enter') createClass(); });

document.getElementById('classGrid').addEventListener('click',e=>{
  const del=e.target.closest('[data-del]');
  if(del){ e.stopPropagation(); deleteClass(del.getAttribute('data-del')); return; }
  const code=e.target.closest('[data-code]');
  if(code){ e.stopPropagation(); copyCode(code.getAttribute('data-code')); return; }
  const card=e.target.closest('.classCard');
  if(card) openClass(card.getAttribute('data-id'));
});
document.getElementById('classGrid').addEventListener('keydown',e=>{
  if(e.key!=='Enter' && e.key!==' ') return;
  const card=e.target.closest('.classCard');
  if(card){ e.preventDefault(); openClass(card.getAttribute('data-id')); }
});

/* ── AUTH GATE ── */
async function init(){
  const who=document.getElementById('whoLabel');
  const { data:{ session } } = await db.auth.getSession();
  // Private demo gate — block everyone except the owner account.
  if(!session || session.user.id!==OWNER_ID){
    who.textContent='Sidan finns inte';
    document.getElementById('main').style.display='none';
    showStatus('Den här sidan är inte tillgänglig.','warn');
    return;
  }
  who.textContent=`Lärare · ${session.user.email}`;
  await loadClasses();
}
init();
</script>
</body>
</html>
